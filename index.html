<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>beinganimelover</title>
    <!-- favicon -->
    <link rel="shortcut icon" href="./assets/images/favicon.webp" type="image/x-icon">

    <!-- ionicon -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <!-- Link Swiper's CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />


    <!-- lenis -->
    <script src="https://unpkg.com/lenis@1.3.17/dist/lenis.min.js"></script>
    <!-- css -->
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/main.css">
</head>

<body>
    <!-- custom cursor -->
    <div class="custom-cursor"></div>
    <div class="custom-cursor-circle"></div>
    <!-- custom cursor end -->

    <div class="smooth-wrapper">
        <div class="smooth-conten">
            <!-- header -->
            <header class="flex">
                <div class="container flex">
                    <div class="site-logo flex">
                        <a href="./index.html">
                            <img src="./assets/images/logo.svg" alt="Logo">
                        </a>
                    </div>
                    <div class="menu flex">
                        <ul class="flex">
                            <li>
                                <a href="#" class="active flex-col" data-text="Home">
                                    <span class="menu-text">Home</span>
                                </a>
                            </li>
                            <li>
                                <a href="#" class="flex-col" data-text="Anime">
                                    <span class="menu-text">Anime</span>
                                </a>
                            </li>
                            <li>
                                <a href="#" class="flex-col" data-text="Categories">
                                    <span class="menu-text">Categories</span>
                                </a>
                            </li>
                            <li>
                                <a href="#" class="flex-col" data-text="Videos">
                                    <span class="menu-text">Videos</span>
                                </a>
                            </li>
                            <li>
                                <a href="#" class="flex-col" data-text="About">
                                    <span class="menu-text">About</span>
                                </a>
                            </li>
                        </ul>
                    </div>
                    <div class="header-btn flex">
                        <a href="https://www.youtube.com/@beinganimelover4" class="cta flex" target="_blank">

                            <span class="cta-text flex">Subscribe</span>

                            <span class="flex">
                                <ion-icon name="logo-youtube"></ion-icon>
                            </span>

                        </a>
                    </div>
                </div>
            </header>
            <!-- End Header -->

            <!-- Hero -->
            <section class="hero flex-col">
                <!-- hero bg -->
                <img src="./assets/images/anime-character/bg-hero.webp" alt="Background" class="hero-bg-img">

                <div class="swiper myHeroSwiper">
                    <div class="swiper-wrapper" id="hero-slider"></div>
                    <div class="swiper-pagination"></div>
                </div>
            </section>

            <!-- End Hero -->

            <!-- youtube videos -->
            <section class="latest-videos flex">
                <div class="container flex-col">
                    <h2>Latest Videos</h2>
                    <div class="video-grid">

                        <div class="video-card">
                            <iframe src="https://www.youtube.com/embed/uF4Mboa-k9U" title="YouTube Shorts"
                                frameborder="0" allowfullscreen>
                            </iframe>
                        </div>

                        <div class="video-card">
                            <iframe src="https://www.youtube.com/embed/buzoQ5ruYEQ" title="YouTube Shorts"
                                frameborder="0" allowfullscreen>
                            </iframe>
                        </div>

                        <div class="video-card">
                            <iframe src="https://www.youtube.com/embed/1BM0ljFm6f8" title="YouTube Shorts"
                                frameborder="0" allowfullscreen>
                            </iframe>
                        </div>

                        <div class="video-card">
                            <iframe src="https://www.youtube.com/embed/IBWNZt5jLIk" title="YouTube Shorts"
                                frameborder="0" allowfullscreen>
                            </iframe>
                        </div>

                        <div class="video-card">
                            <iframe src="https://www.youtube.com/embed/qnmZ7tB8Do4" title="YouTube Shorts"
                                frameborder="0" allowfullscreen>
                            </iframe>
                        </div>

                    </div>

                    <a href="https://www.youtube.com/@beinganimelover4" class="cta flex" target="_blank">

                        <span class="cta-text flex">View Channel</span>

                        <span class="flex">
                            <ion-icon name="logo-youtube"></ion-icon>
                        </span>
                    </a>
                </div>
            </section>



            <!-- Under Construction -->
            <section class="under-construction flex">
                <div class="container flex-col">
                    <h2>Under Construction</h2>
                    <img src="./assets/images/uc.webp" alt="">
                </div>
            </section>
            <!-- End Under Construction -->
        </div>
    </div>

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"
        integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js"
        integrity="sha512-P2IDYZfqSwjcSjX0BKeNhwRUH8zRPGlgcWl5n6gBLzdi4Y5/0O4zaXrtO4K9TZK6Hn1BenYpKowuCavNandERg=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollSmoother.min.js"
        integrity="sha512-t4hwZimhnCKT3YLAsEcAcRDkngVFfCcUIfNLIjklrIZAZKD+GfQMP7HbRcsVHxNS48WRBSywNU1uSM2zzLQt1Q=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <!-- js -->
    <script src="./assets/js/anime-hero-list.js"></script>
    <script src="./assets/js/script.js"></script>
    <script src="./assets/js/animation.js"></script>
</body>

</html>
